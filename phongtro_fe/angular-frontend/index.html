<!DOCTYPE html>
<html lang="vi" ng-app="phongtroApp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quy Nhon Rental | Tìm phòng trọ Quy Nhơn nhanh chóng</title>
  <meta name="description" content="Dịch vụ tìm kiếm phòng trọ, căn hộ, biệt thự cao cấp tại thành phố biển Quy Nhơn.">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

  <!-- TailwindCSS v3 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary': 'var(--primary)',
            'primary-foreground': 'var(--primary-foreground)',
            'background': 'var(--background)',
            'foreground': 'var(--foreground)',
            'card': 'var(--card)',
            'card-foreground': 'var(--card-foreground)',
            'popover': 'var(--popover)',
            'popover-foreground': 'var(--popover-foreground)',
            'secondary': 'var(--secondary)',
            'secondary-foreground': 'var(--secondary-foreground)',
            'muted': 'var(--muted)',
            'muted-foreground': 'var(--muted-foreground)',
            'accent': 'var(--accent)',
            'accent-foreground': 'var(--accent-foreground)',
            'destructive': 'var(--destructive)',
            'destructive-foreground': 'var(--destructive-foreground)',
            'border': 'var(--border)',
            'input': 'var(--input)',
            'ring': 'var(--ring)',
            'deep-charcoal': '#1a1a1a',
            'soft-white': '#f5f5f5',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Inter', 'sans-serif'],
          },
          borderRadius: {
            lg: '0.5rem',
            md: 'calc(0.5rem - 2px)',
            sm: 'calc(0.5rem - 4px)',
          }
        }
      }
    }
  </script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- AngularJS 1.8 -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-animate.min.js"></script>
</head>
<body class="bg-background text-foreground font-sans antialiased">

  <!-- AngularJS View Container -->
  <div ng-view class="ng-view-container"></div>

  <!-- App Scripts -->
  <script src="app.js"></script>
  <script src="data/properties.js"></script>
  <script src="controllers/HomeController.js"></script>
  <script src="controllers/LoginController.js"></script>
  <script src="controllers/RegisterController.js"></script>
  <script src="filters/filters.js"></script>
</body>
</html>
